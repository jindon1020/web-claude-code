<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code - Web Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a24;
            --bg-input: #1c1c24;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #2e2e3a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            height: 56px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            flex-shrink: 0;
        }
        .logo { display: flex; align-items: center; gap: 0.75rem; font-weight: 600; font-size: 1.1rem; }
        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
        }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .model-badge {
            background: var(--bg-tertiary); padding: 0.375rem 0.75rem;
            border-radius: 6px; font-size: 0.8rem; color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .new-chat-btn {
            background: var(--accent); color: white; border: none;
            padding: 0.5rem 1rem; border-radius: 8px; font-size: 0.875rem;
            font-weight: 500; cursor: pointer; transition: all 0.2s;
        }
        .new-chat-btn:hover { background: var(--accent-hover); }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-container {
            flex: 1; overflow-y: auto; padding: 1.5rem 2rem;
            max-width: 900px; width: 100%; margin: 0 auto;
        }
        .chat-container::-webkit-scrollbar { width: 8px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .message {
            display: flex; gap: 1rem; margin-bottom: 1.5rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { flex-direction: row-reverse; }
        .message-avatar {
            width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 0.875rem; flex-shrink: 0;
        }
        .message.user .message-avatar { background: var(--accent); }
        .message.assistant .message-avatar { background: linear-gradient(135deg, #10b981, #059669); }
        .message-content { flex: 1; min-width: 0; }
        .message-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
        .message-role { font-weight: 600; font-size: 0.875rem; }
        .message-time { font-size: 0.75rem; color: #64748b; }
        .message-text { line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .message-text img { max-width: 100%; border-radius: 8px; margin: 0.5rem 0; }
        .message-text video { max-width: 100%; border-radius: 8px; margin: 0.5rem 0; }
        .message-media { margin: 0.5rem 0; }
        .message-media img { max-width: 100%; max-height: 300px; border-radius: 8px; cursor: pointer; }
        .message-media video { max-width: 100%; max-height: 400px; border-radius: 8px; }
        .message-media a { color: var(--accent); text-decoration: none; }
        .message-media a:hover { text-decoration: underline; }
        .message-text code { background: var(--bg-tertiary); padding: 0.125rem 0.375rem; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .message-text pre { background: var(--bg-tertiary); padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 0.75rem 0; }
        .typing-indicator { display: flex; gap: 0.5rem; padding: 1rem; }
        .typing-indicator span { width: 8px; height: 8px; background: #64748b; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-secondary); }
        .empty-state h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--accent), #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-container {
            background: var(--bg-secondary); border-top: 1px solid var(--border);
            padding: 1rem 2rem 1.5rem; flex-shrink: 0;
        }
        .input-wrapper {
            max-width: 900px; margin: 0 auto; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 16px; transition: all 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); }
        .input-textarea {
            width: 100%; background: transparent; border: none; color: var(--text-primary);
            font-family: var(--font-sans); font-size: 1rem; padding: 1rem;
            resize: none; min-height: 60px; max-height: 200px; line-height: 1.5;
        }
        .input-textarea:focus { outline: none; }
        .input-textarea::placeholder { color: #64748b; }
        .upload-progress {
            background: var(--bg-tertiary); padding: 0.75rem 1rem; margin: 0 1rem;
            border-radius: 8px; display: none;
        }
        .upload-progress.active { display: block; }
        .upload-progress-bar {
            height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
        }
        .upload-progress-fill {
            height: 100%; background: var(--accent); width: 0%; transition: width 0.2s;
        }
        .upload-progress-text { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; }
        .input-actions {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.5rem 1rem 0.75rem; border-top: 1px solid var(--border);
        }
        .input-tools { display: flex; gap: 0.5rem; }
        .input-tool {
            width: 36px; height: 36px; background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-secondary); transition: all 0.2s;
        }
        .input-tool:hover { background: var(--border); color: var(--text-primary); }
        .input-tool.disabled { opacity: 0.5; cursor: not-allowed; }
        .input-tool.uploading { background: var(--accent); border-color: var(--accent); color: white; }
        .send-btn {
            background: var(--accent); color: white; border: none; padding: 0.5rem 1.25rem;
            border-radius: 8px; font-size: 0.875rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem;
        }
        .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .file-preview {
            display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.75rem 1rem;
            border-top: 1px solid var(--border);
        }
        .file-item {
            background: var(--bg-tertiary); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.5rem 0.75rem;
            display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem;
        }
        .file-item img { width: 24px; height: 24px; object-fit: cover; border-radius: 4px; }
        .file-remove { cursor: pointer; color: #64748b; transition: color 0.2s; }
        .file-remove:hover { color: #ef4444; }
        .file-upload-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 15, 0.9); display: none;
            align-items: center; justify-content: center; z-index: 999;
        }
        .file-upload-overlay.active { display: flex; }
        .file-upload-box {
            background: var(--bg-secondary); border: 2px dashed var(--border);
            border-radius: 16px; padding: 3rem; text-align: center; width: 400px;
        }
        .file-upload-icon { font-size: 3rem; margin-bottom: 1rem; }
        .file-upload-text { color: var(--text-secondary); margin-bottom: 1rem; }
        .file-upload-btn {
            background: var(--accent); color: white; border: none;
            padding: 0.75rem 1.5rem; border-radius: 8px;
            font-size: 0.9rem; cursor: pointer;
        }
        .file-upload-btn:hover { background: var(--accent-hover); }
        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--bg-tertiary); color: var(--text-primary);
            padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.9rem;
            border: 1px solid var(--border); opacity: 0; transition: all 0.3s; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">C</div>
            <span>Claude Code</span>
        </div>
        <div class="header-right">
            <span class="model-badge" id="sessionBadge">新会话</span>
            <button class="new-chat-btn" onclick="newChat()">新对话</button>
        </div>
    </header>

    <main class="main">
        <div class="chat-container" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <h2>Claude Code Web</h2>
                <p>发送消息开始对话，可以上传图片、视频或文件</p>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea class="input-textarea" id="messageInput" placeholder="给 Claude 发送消息..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                <div class="file-preview" id="filePreview" style="display: none;"></div>
                <div class="upload-progress" id="uploadProgress">
                    <div class="upload-progress-bar"><div class="upload-progress-fill" id="uploadProgressFill"></div></div>
                    <div class="upload-progress-text" id="uploadProgressText">上传中...</div>
                </div>
                <div class="input-actions">
                    <div class="input-tools">
                        <label class="input-tool" for="fileInput" title="上传文件">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </label>
                        <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileSelect(event)">
                    </div>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <span>发送</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div class="file-upload-overlay" id="fileUploadOverlay" onclick="closeUploadOverlay(event)">
        <div class="file-upload-box">
            <div class="file-upload-icon">📁</div>
            <div class="file-upload-text">拖拽文件到这里，或点击选择</div>
            <button class="file-upload-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let sessionId = localStorage.getItem('claude_session_id') || null;
        let isStreaming = false;
        let isUploading = false;
        let files = [];
        let uploadProgress = 0;

        // 初始化
        if (!sessionId) { newChat(); } else { loadHistory(); }

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // 拖拽上传
        const overlay = document.getElementById('fileUploadOverlay');
        overlay.addEventListener('dragover', e => { e.preventDefault(); overlay.querySelector('.file-upload-box').style.borderColor = 'var(--accent)'; });
        overlay.addEventListener('dragleave', e => { e.preventDefault(); overlay.querySelector('.file-upload-box').style.borderColor = 'var(--border)'; });
        overlay.addEventListener('drop', e => {
            e.preventDefault();
            overlay.querySelector('.file-upload-box').style.borderColor = 'var(--border)';
            handleFiles(e.dataTransfer.files);
        });

        function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

        async function handleFileSelect(e) { handleFiles(e.target.files); e.target.value = ''; }

        async function handleFiles(fileList) {
            const newFiles = Array.from(fileList);
            if (newFiles.length === 0) return;

            isUploading = true;
            updateUI();

            const formData = new FormData();
            newFiles.forEach(f => formData.append('files', f));
            formData.append('sessionId', sessionId);

            try {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/upload');

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        uploadProgress = Math.round((e.loaded / e.total) * 100);
                        document.getElementById('uploadProgressFill').style.width = uploadProgress + '%';
                        document.getElementById('uploadProgressText').textContent = `上传中... ${uploadProgress}%`;
                    }
                };

                const response = await new Promise((resolve, reject) => {
                    xhr.onload = () => resolve(JSON.parse(xhr.responseText));
                    xhr.onerror = () => reject(new Error('上传失败'));
                    xhr.send(formData);
                });

                files = [...files, ...response.files];
                updateFilePreview();
                showToast(`已上传 ${response.files.length} 个文件`);
            } catch (e) {
                showToast('上传失败: ' + e.message);
            }

            isUploading = false;
            uploadProgress = 0;
            updateUI();
        }

        function updateUI() {
            const sendBtn = document.getElementById('sendBtn');
            const fileInput = document.querySelector('label[for="fileInput"]');
            const uploadProgress = document.getElementById('uploadProgress');

            sendBtn.disabled = isStreaming || isUploading;
            fileInput.classList.toggle('disabled', isUploading);
            fileInput.classList.toggle('uploading', isUploading);
            uploadProgress.classList.toggle('active', isUploading);

            if (!isUploading) {
                document.getElementById('uploadProgressFill').style.width = '0%';
                document.getElementById('uploadProgressText').textContent = '上传中...';
            }
        }

        function updateFilePreview() {
            const preview = document.getElementById('filePreview');
            if (files.length === 0) { preview.style.display = 'none'; return; }
            preview.style.display = 'flex';
            preview.innerHTML = files.map((f, i) => {
                let icon = '';
                if (f.type && f.type.startsWith('image/')) {
                    icon = f.thumbnail ? `<img src="${f.thumbnail}">` : '🖼️';
                } else if (f.type && f.type.startsWith('video/')) {
                    icon = f.thumbnail ? `<video src="${f.thumbnail}" muted></video>` : '🎬';
                } else {
                    icon = '📄';
                }
                return `<div class="file-item">${icon}<span>${f.name}</span><span class="file-remove" onclick="removeFile(${i})">×</span></div>`;
            }).join('');
        }

        function removeFile(index) { files.splice(index, 1); updateFilePreview(); }

        async function newChat() {
            if (isStreaming) return;
            try {
                const res = await fetch('/api/sessions', { method: 'POST' });
                const data = await res.json();
                sessionId = data.sessionId;
                localStorage.setItem('claude_session_id', sessionId);
                files = [];
                updateFilePreview();
                document.getElementById('chatContainer').innerHTML = `
                    <div class="empty-state" id="emptyState">
                        <h2>Claude Code Web</h2>
                        <p>发送消息开始对话，可以上传图片、视频或文件</p>
                    </div>`;
                document.getElementById('sessionBadge').textContent = '新会话';
            } catch (e) { showToast('创建新会话失败'); }
        }

        async function loadHistory() {
            if (!sessionId) return;
            try {
                const res = await fetch('/api/sessions/' + sessionId);
                const data = await res.json();
                if (data.history && data.history.length > 0) {
                    const container = document.getElementById('chatContainer');
                    container.innerHTML = '';
                    data.history.forEach(msg => addMessage(msg.role, msg.content, msg.files));
                    document.getElementById('sessionBadge').textContent = data.sessionName || '会话中';
                }
            } catch (e) { console.error('加载历史失败:', e); }
        }

        function addMessage(role, content, files = []) {
            const container = document.getElementById('chatContainer');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            let mediaHtml = '';
            if (files && files.length > 0) {
                mediaHtml = files.map(f => {
                    const url = f.url || f.path || '';
                    if (!url) return '';
                    if (f.type && f.type.startsWith('image/')) {
                        return `<div class="message-media"><img src="${url}" alt="${f.name || 'image'}" onclick="window.open('${url}', '_blank')"></div>`;
                    }
                    if (f.type && f.type.startsWith('video/')) {
                        return `<div class="message-media"><video src="${url}" controls preload="metadata"></video></div>`;
                    }
                    return `<div class="message-media"><a href="${url}" target="_blank">📄 ${f.name || 'file'}</a></div>`;
                }).join('');
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '你' : 'C'}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-role">${role === 'user' ? '你' : 'Claude'}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    ${mediaHtml ? mediaHtml : ''}
                    <div class="message-text">${formatContent(content)}</div>
                </div>`;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function formatContent(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `<div class="message-avatar">C</div><div class="message-content"><div class="message-header"><span class="message-role">Claude</span></div><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() { const typing = document.getElementById('typingIndicator'); if (typing) typing.remove(); }

        async function sendMessage() {
            if (isStreaming || isUploading) return;
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message && files.length === 0) return;

            isStreaming = true;
            updateUI();

            addMessage('user', message, files.map(f => ({ name: f.name, type: f.type, url: f.path || '', path: f.path })));
            input.value = ''; input.style.height = 'auto';
            showTyping();

            const formData = new FormData();
            formData.append('message', message);
            formData.append('sessionId', sessionId);
            files.forEach(f => formData.append('files', f.file));

            try {
                const response = await fetch('/api/chat', { method: 'POST', body: formData });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                let responseFiles = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const text = decoder.decode(value);
                    const lines = text.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.type === 'content') {
                                    if (!fullContent) { removeTyping(); addMessage('assistant', ''); }
                                    fullContent += data.content;
                                    updateLastMessage(fullContent);
                                } else if (data.type === 'file') {
                                    responseFiles.push(data.file);
                                    appendMediaToLastMessage(data.file);
                                } else if (data.type === 'end') {
                                    isStreaming = false;
                                    files = [];
                                    updateFilePreview();
                                    updateUI();
                                    document.getElementById('sessionBadge').textContent = data.sessionName || '会话中';
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (error) {
                removeTyping();
                showToast('发送失败: ' + error.message);
                isStreaming = false;
                updateUI();
            }
        }

        function updateLastMessage(content) {
            const container = document.getElementById('chatContainer');
            const lastMessage = container.querySelector('.message.assistant:last-child .message-text');
            if (lastMessage) { lastMessage.innerHTML = formatContent(content); container.scrollTop = container.scrollHeight; }
        }

        function appendMediaToLastMessage(file) {
            const container = document.getElementById('chatContainer');
            const lastMessage = container.querySelector('.message.assistant:last-child .message-content');
            if (lastMessage && file.url) {
                let mediaHtml = '';
                if (file.type.startsWith('image/')) mediaHtml = `<img src="${file.url}" alt="${file.name}">`;
                else if (file.type.startsWith('video/')) mediaHtml = `<video src="${file.url}" controls></video>`;
                else mediaHtml = `<a href="${file.url}" target="_blank">📄 ${file.name}</a>`;
                lastMessage.innerHTML += mediaHtml;
                container.scrollTop = container.scrollHeight;
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function closeUploadOverlay(e) { if (e.target === e.currentTarget) document.getElementById('fileUploadOverlay').classList.remove('active'); }
    </script>
</body>
</html>
