<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAUDE // TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #030508;
            --bg-primary: #0a0f14;
            --bg-secondary: #111a22;
            --bg-tertiary: #1a2633;
            --accent-cyan: #00ffd5;
            --accent-magenta: #ff00aa;
            --accent-yellow: #ffd600;
            --text-primary: #e8f4f0;
            --text-secondary: #5a7a8a;
            --text-dim: #2a3f4d;
            --border: #1e3342;
            --glow-cyan: 0 0 20px rgba(0, 255, 213, 0.3);
            --glow-magenta: 0 0 20px rgba(255, 0, 170, 0.3);
        }

        * { scrollbar-width: thin; scrollbar-color: var(--border) var(--bg-primary); }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-deep);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Scanlines overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 213, 0.015) 2px,
                rgba(0, 255, 213, 0.015) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* Subtle grid background */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0, 255, 213, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 213, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }

        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            grid-template-rows: 56px 1fr auto;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            grid-row: 1 / -1;
            background: var(--bg-primary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-cyan), transparent 50%, var(--accent-magenta));
            opacity: 0.5;
        }

        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--bg-deep);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: var(--glow-cyan); }
            50% { box-shadow: var(--glow-magenta); }
        }

        .logo-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
            letter-spacing: 0.15em;
        }

        .nav-section {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .nav-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
        }

        .new-chat-btn {
            width: 100%;
            padding: 0.75rem 1rem;
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            font-family: inherit;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .new-chat-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 213, 0.1), transparent);
            transition: left 0.5s;
        }

        .new-chat-btn:hover::before { left: 100%; }
        .new-chat-btn:hover { background: rgba(0, 255, 213, 0.1); box-shadow: var(--glow-cyan); }

        .sidebar-stats {
            padding: 1rem;
            margin-top: auto;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .stat-value {
            color: var(--accent-cyan);
        }

        /* Header */
        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            position: relative;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
            opacity: 0.3;
        }

        .session-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .session-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .model-badge {
            font-size: 0.7rem;
            color: var(--text-dim);
            padding: 0.25rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 2px;
            letter-spacing: 0.1em;
        }

        .header-actions {
            display: flex;
            gap: 0.5rem;
        }

        .header-btn {
            padding: 0.5rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .header-btn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        /* Main Chat Area */
        .chat-area {
            background: var(--bg-primary);
            overflow-y: auto;
            padding: 2rem;
            position: relative;
        }

        .message {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 600;
            flex-shrink: 0;
            position: relative;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, var(--accent-magenta), #aa0066);
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--accent-cyan), #00aa88);
            color: var(--bg-deep);
        }

        .message-avatar::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 4px;
            background: inherit;
            opacity: 0.3;
            filter: blur(8px);
            z-index: -1;
        }

        .message-content {
            flex: 1;
            max-width: 700px;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .message-role {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
        }

        .message.user .message-role { color: var(--accent-magenta); }
        .message.assistant .message-role { color: var(--accent-cyan); }

        .message-time {
            font-size: 0.65rem;
            color: var(--text-dim);
        }

        .message-text {
            font-size: 0.875rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text-primary);
        }

        .message-text code {
            background: var(--bg-tertiary);
            padding: 0.125rem 0.375rem;
            border-radius: 2px;
            font-size: 0.8em;
            color: var(--accent-yellow);
        }

        .message-text pre {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            margin: 0.75rem 0;
        }

        .message-text pre code {
            background: none;
            padding: 0;
        }

        .message-media {
            margin: 0.75rem 0;
        }

        .message-media img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 4px;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .message-media video {
            max-width: 100%;
            max-height: 400px;
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 0.25rem;
            padding: 0.5rem;
        }

        .typing-indicator span {
            width: 4px;
            height: 4px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-title {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .empty-text {
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        /* Input Area */
        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
            position: relative;
        }

        .input-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--accent-magenta), transparent 50%, var(--accent-cyan));
            opacity: 0.3;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }

        .input-textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            padding: 1rem;
            resize: none;
            min-height: 60px;
            max-height: 200px;
            line-height: 1.6;
        }

        .input-textarea:focus { outline: none; }
        .input-textarea::placeholder { color: var(--text-dim); }

        .file-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border);
        }

        .file-item {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 0.375rem 0.75rem;
            border-radius: 2px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
        }

        .file-item img {
            width: 20px;
            height: 20px;
            object-fit: cover;
            border-radius: 2px;
        }

        .file-remove {
            cursor: pointer;
            color: var(--text-dim);
            transition: color 0.2s;
        }

        .file-remove:hover { color: var(--accent-magenta); }

        .upload-progress {
            padding: 0.5rem 1rem;
            display: none;
            background: var(--bg-tertiary);
        }

        .upload-progress.active { display: block; }

        .upload-progress-bar {
            height: 2px;
            background: var(--border);
            overflow: hidden;
        }

        .upload-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
            width: 0%;
            transition: width 0.2s;
        }

        .upload-progress-text {
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 0.25rem;
            letter-spacing: 0.1em;
        }

        .input-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1rem 0.75rem;
            border-top: 1px solid var(--border);
        }

        .input-tools {
            display: flex;
            gap: 0.5rem;
        }

        .input-tool {
            width: 32px;
            height: 32px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .input-tool:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .input-tool.disabled { opacity: 0.3; cursor: not-allowed; }
        .input-tool.uploading { border-color: var(--accent-magenta); color: var(--accent-magenta); }

        .send-btn {
            background: linear-gradient(90deg, var(--accent-cyan), #00ccaa);
            color: var(--bg-deep);
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 2px;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .send-btn:hover:not(:disabled) {
            box-shadow: var(--glow-cyan);
            transform: translateY(-1px);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .shortcut-hint {
            font-size: 0.65rem;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        .shortcut-hint kbd {
            background: var(--bg-tertiary);
            padding: 0.125rem 0.375rem;
            border-radius: 2px;
            margin: 0 0.125rem;
        }

        /* File upload overlay */
        .file-upload-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(3, 5, 8, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .file-upload-overlay.active { display: flex; }

        .file-upload-box {
            background: var(--bg-secondary);
            border: 2px dashed var(--accent-cyan);
            border-radius: 8px;
            padding: 4rem;
            text-align: center;
            animation: borderPulse 2s infinite;
        }

        @keyframes borderPulse {
            0%, 100% { border-color: var(--accent-cyan); }
            50% { border-color: var(--accent-magenta); }
        }

        .file-upload-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        .file-upload-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            letter-spacing: 0.05em;
        }

        .file-upload-btn {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 0.75rem 2rem;
            font-family: inherit;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-upload-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-deep);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            border: 1px solid var(--accent-cyan);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1001;
            letter-spacing: 0.05em;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">C</div>
                    <div>
                        <div>CLAUDE //</div>
                        <div class="logo-text">TERMINAL MODE</div>
                    </div>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-label">Actions</div>
                <button class="new-chat-btn" onclick="newChat()">
                    <span>＋</span> NEW SESSION
                </button>
            </div>

            <div class="sidebar-stats">
                <div class="stat-item">
                    <span>SESSION ID</span>
                    <span class="stat-value" id="sessionIdDisplay">------</span>
                </div>
                <div class="stat-item">
                    <span>MODEL</span>
                    <span class="stat-value">MINIMAX-M2.5</span>
                </div>
                <div class="stat-item">
                    <span>STATUS</span>
                    <span class="stat-value" style="color: var(--accent-cyan);">ONLINE</span>
                </div>
            </div>
        </aside>

        <!-- Header -->
        <header class="header">
            <div class="session-info">
                <div class="session-status">
                    <span class="status-dot"></span>
                    <span>CONNECTED</span>
                </div>
                <span class="model-badge" id="sessionBadge">NEW SESSION</span>
            </div>
            <div class="header-actions">
                <button class="header-btn" title="Clear History">CLR</button>
                <button class="header-btn" title="Export">EXP</button>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">▚</div>
                <div class="empty-title">AWAITING INPUT</div>
                <div class="empty-text">// Send a message to initialize Claude Code</div>
            </div>
        </main>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea class="input-textarea" id="messageInput" placeholder="// Enter your query..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
                <div class="file-preview" id="filePreview" style="display: none;"></div>
                <div class="upload-progress" id="uploadProgress">
                    <div class="upload-progress-bar">
                        <div class="upload-progress-fill" id="uploadProgressFill"></div>
                    </div>
                    <div class="upload-progress-text" id="uploadProgressText">UPLOADING...</div>
                </div>
                <div class="input-actions">
                    <div class="input-tools">
                        <label class="input-tool" for="fileInput" title="Upload File (Drag & Drop supported)">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                            </svg>
                        </label>
                        <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileSelect(event)">
                    </div>
                    <span class="shortcut-hint"><kbd>ENTER</kbd> to send · <kbd>SHIFT+ENTER</kbd> for new line</span>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <span>SEND</span>
                        <span>↵</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- File Upload Overlay -->
    <div class="file-upload-overlay" id="fileUploadOverlay" onclick="closeUploadOverlay(event)">
        <div class="file-upload-box">
            <div class="file-upload-icon">⧉</div>
            <div class="file-upload-text">DROP FILES HERE OR CLICK TO SELECT</div>
            <button class="file-upload-btn" onclick="document.getElementById('fileInput').click()">SELECT FILES</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let sessionId = localStorage.getItem('claude_session_id') || null;
        let isStreaming = false;
        let isUploading = false;
        let files = [];

        // Initialize
        if (!sessionId) { newChat(); } else { loadHistory(); }

        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Drag and drop
        const overlay = document.getElementById('fileUploadOverlay');
        overlay.addEventListener('dragover', e => { e.preventDefault(); });
        overlay.addEventListener('drop', e => {
            e.preventDefault();
            handleFiles(e.dataTransfer.files);
        });

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function handleFileSelect(e) { handleFiles(e.target.files); e.target.value = ''; }

        async function handleFiles(fileList) {
            const newFiles = Array.from(fileList);
            if (newFiles.length === 0) return;

            isUploading = true;
            updateUI();

            const formData = new FormData();
            newFiles.forEach(f => formData.append('files', f));
            formData.append('sessionId', sessionId);

            try {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', '/api/upload');

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const progress = Math.round((e.loaded / e.total) * 100);
                        document.getElementById('uploadProgressFill').style.width = progress + '%';
                        document.getElementById('uploadProgressText').textContent = `UPLOADING... ${progress}%`;
                    }
                };

                const response = await new Promise((resolve, reject) => {
                    xhr.onload = () => resolve(JSON.parse(xhr.responseText));
                    xhr.onerror = () => reject(new Error('Upload failed'));
                    xhr.send(formData);
                });

                files = [...files, ...response.files];
                updateFilePreview();
                showToast(`// UPLOADED ${response.files.length} FILE(S)`);
            } catch (e) {
                showToast('// ERROR: ' + e.message);
            }

            isUploading = false;
            updateUI();
        }

        function updateUI() {
            const sendBtn = document.getElementById('sendBtn');
            const fileInput = document.querySelector('label[for="fileInput"]');
            const uploadProgress = document.getElementById('uploadProgress');

            sendBtn.disabled = isStreaming || isUploading;
            fileInput.classList.toggle('disabled', isUploading);
            fileInput.classList.toggle('uploading', isUploading);
            uploadProgress.classList.toggle('active', isUploading);

            if (!isUploading) {
                document.getElementById('uploadProgressFill').style.width = '0%';
            }
        }

        function updateFilePreview() {
            const preview = document.getElementById('filePreview');
            if (files.length === 0) { preview.style.display = 'none'; return; }
            preview.style.display = 'flex';
            preview.innerHTML = files.map((f, i) => {
                let icon = '';
                if (f.type && f.type.startsWith('image/')) {
                    icon = f.thumbnail ? `<img src="${f.thumbnail}">` : '🖼';
                } else if (f.type && f.type.startsWith('video/')) {
                    icon = '🎬';
                } else {
                    icon = '📄';
                }
                return `<div class="file-item">${icon}<span>${f.name}</span><span class="file-remove" onclick="removeFile(${i})">×</span></div>`;
            }).join('');
        }

        function removeFile(index) { files.splice(index, 1); updateFilePreview(); }

        async function newChat() {
            if (isStreaming) return;
            try {
                const res = await fetch('/api/sessions', { method: 'POST' });
                const data = await res.json();
                sessionId = data.sessionId;
                localStorage.setItem('claude_session_id', sessionId);
                files = [];
                updateFilePreview();
                document.getElementById('chatContainer').innerHTML = `
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">▚</div>
                        <div class="empty-title">AWAITING INPUT</div>
                        <div class="empty-text">// Send a message to initialize Claude Code</div>
                    </div>`;
                document.getElementById('sessionBadge').textContent = 'NEW SESSION';
                document.getElementById('sessionIdDisplay').textContent = sessionId.substring(0, 8).toUpperCase();
            } catch (e) { showToast('// ERROR: Session init failed'); }
        }

        async function loadHistory() {
            if (!sessionId) return;
            try {
                const res = await fetch('/api/sessions/' + sessionId);
                const data = await res.json();
                if (data.history && data.history.length > 0) {
                    const container = document.getElementById('chatContainer');
                    container.innerHTML = '';
                    data.history.forEach(msg => addMessage(msg.role, msg.content, msg.files));
                    document.getElementById('sessionBadge').textContent = data.sessionName || 'ACTIVE';
                    document.getElementById('sessionIdDisplay').textContent = sessionId.substring(0, 8).toUpperCase();
                }
            } catch (e) { console.error('History load failed:', e); }
        }

        function addMessage(role, content, files = []) {
            const container = document.getElementById('chatContainer');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();

            const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });

            let mediaHtml = '';
            if (files && files.length > 0) {
                mediaHtml = files.map(f => {
                    const url = f.url || f.path || '';
                    if (!url) return '';
                    if (f.type && f.type.startsWith('image/')) {
                        return `<div class="message-media"><img src="${url}" alt="${f.name || 'image'}" onclick="window.open('${url}', '_blank')"></div>`;
                    }
                    if (f.type && f.type.startsWith('video/')) {
                        return `<div class="message-media"><video src="${url}" controls preload="metadata"></video></div>`;
                    }
                    return `<div class="message-media"><a href="${url}" target="_blank">📄 ${f.name || 'file'}</a></div>`;
                }).join('');
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${role === 'user' ? 'U' : 'C'}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-role">${role === 'user' ? 'USER' : 'CLAUDE'}</span>
                        <span class="message-time">[${time}]</span>
                    </div>
                    ${mediaHtml}
                    <div class="message-text">${formatContent(content)}</div>
                </div>`;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function formatContent(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.remove();

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">C</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-role">CLAUDE</span>
                        <span class="typing-indicator"><span></span><span></span><span></span></span>
                    </div>
                </div>`;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() { const typing = document.getElementById('typingIndicator'); if (typing) typing.remove(); }

        async function sendMessage() {
            if (isStreaming || isUploading) return;
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message && files.length === 0) return;

            isStreaming = true;
            updateUI();

            addMessage('user', message, files.map(f => ({ name: f.name, type: f.type, url: f.path || '', path: f.path })));
            input.value = ''; input.style.height = 'auto';
            showTyping();

            const formData = new FormData();
            formData.append('message', message);
            formData.append('sessionId', sessionId);
            files.forEach(f => formData.append('files', f.file));

            try {
                const response = await fetch('/api/chat', { method: 'POST', body: formData });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const text = decoder.decode(value);
                    const lines = text.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.type === 'content') {
                                    if (!fullContent) { removeTyping(); addMessage('assistant', ''); }
                                    fullContent += data.content;
                                    updateLastMessage(fullContent);
                                } else if (data.type === 'end') {
                                    isStreaming = false;
                                    files = [];
                                    updateFilePreview();
                                    updateUI();
                                    document.getElementById('sessionBadge').textContent = data.sessionName || 'ACTIVE';
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (error) {
                removeTyping();
                showToast('// ERROR: ' + error.message);
                isStreaming = false;
                updateUI();
            }
        }

        function updateLastMessage(content) {
            const container = document.getElementById('chatContainer');
            const lastMessage = container.querySelector('.message.assistant:last-child .message-text');
            if (lastMessage) { lastMessage.innerHTML = formatContent(content); container.scrollTop = container.scrollHeight; }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function closeUploadOverlay(e) { if (e.target === e.currentTarget) document.getElementById('fileUploadOverlay').classList.remove('active'); }
    </script>
</body>
</html>
