<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code - Web Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a24;
            --bg-input: #1c1c24;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-danger: #ef4444;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border: #2e2e3a;
            --border-light: #3e3e4a;
            --success: #22c55e;
            --warning: #f59e0b;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Consolas', monospace;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            height: 56px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .model-badge {
            background: var(--bg-tertiary);
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .new-chat-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: var(--accent-hover);
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Messages */
        .message {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--accent);
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .message.role {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .message-text {
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message-text code {
            background: var(--bg-tertiary);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.9em;
        }

        .message-text pre {
            background: var(--bg-tertiary);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.75rem 0;
        }

        .message-text pre code {
            background: none;
            padding: 0;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-tertiary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Confirm Dialog */
        .confirm-dialog {
            background: var(--bg-tertiary);
            border: 1px solid var(--warning);
            border-radius: 12px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .confirm-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .confirm-title::before {
            content: "⚠️";
        }

        .confirm-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .confirm-btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .confirm-btn.allow {
            background: var(--success);
            color: white;
        }

        .confirm-btn.deny {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .confirm-btn:hover {
            opacity: 0.9;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* Input Area */
        .input-container {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 1rem 2rem 1.5rem;
            flex-shrink: 0;
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .input-textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 1rem;
            padding: 1rem;
            resize: none;
            min-height: 60px;
            max-height: 200px;
            line-height: 1.5;
        }

        .input-textarea:focus {
            outline: none;
        }

        .input-textarea::placeholder {
            color: var(--text-tertiary);
        }

        .input-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1rem 0.75rem;
            border-top: 1px solid var(--border);
        }

        .input-tools {
            display: flex;
            gap: 0.5rem;
        }

        .input-tool {
            width: 36px;
            height: 36px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .input-tool:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .input-tool.has-file {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* File Preview */
        .file-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border);
        }

        .file-item {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
        }

        .file-remove {
            cursor: pointer;
            color: var(--text-tertiary);
            transition: color 0.2s;
        }

        .file-remove:hover {
            color: var(--accent-danger);
        }

        /* Hidden file input */
        #fileInput {
            display: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 15, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 0 1rem;
            }

            .chat-container {
                padding: 1rem;
            }

            .input-container {
                padding: 1rem;
            }

            .model-badge {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">C</div>
                <span>Claude Code</span>
            </div>
        </div>
        <div class="header-right">
            <span class="model-badge">MiniMax-M2.5</span>
            <button class="new-chat-btn" onclick="newChat()">新对话</button>
        </div>
    </header>

    <main class="main">
        <div class="chat-container" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <h2>Claude Code Web</h2>
                <p>发送消息开始对话，可以上传图片、视频或文件</p>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea
                    class="input-textarea"
                    id="messageInput"
                    placeholder="给 Claude 发送消息..."
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <div class="file-preview" id="filePreview" style="display: none;"></div>
                <div class="input-actions">
                    <div class="input-tools">
                        <label class="input-tool" for="fileInput" title="上传文件">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </label>
                        <input type="file" id="fileInput" multiple onchange="handleFileSelect(event)">
                    </div>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <span>发送</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        let sessionId = localStorage.getItem('claude_session_id') || null;
        let isStreaming = false;
        let files = [];
        let waitingForConfirm = false;
        let confirmResolve = null;

        // 初始化
        if (!sessionId) {
            newChat();
        } else {
            loadHistory();
        }

        // 自动调整输入框高度
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function handleFileSelect(e) {
            const newFiles = Array.from(e.target.files);
            files = [...files, ...newFiles];
            updateFilePreview();
            e.target.value = '';
        }

        function updateFilePreview() {
            const preview = document.getElementById('filePreview');
            if (files.length === 0) {
                preview.style.display = 'none';
                return;
            }
            preview.style.display = 'flex';
            preview.innerHTML = files.map((f, i) => `
                <div class="file-item">
                    <span>${f.name}</span>
                    <span class="file-remove" onclick="removeFile(${i})">×</span>
                </div>
            `).join('');
        }

        function removeFile(index) {
            files.splice(index, 1);
            updateFilePreview();
        }

        async function newChat() {
            if (isStreaming) return;

            try {
                const res = await fetch('/api/sessions', { method: 'POST' });
                const data = await res.json();
                sessionId = data.sessionId;
                localStorage.setItem('claude_session_id', sessionId);
                files = [];
                updateFilePreview();
                document.getElementById('chatContainer').innerHTML = `
                    <div class="empty-state" id="emptyState">
                        <h2>Claude Code Web</h2>
                        <p>发送消息开始对话，可以上传图片、视频或文件</p>
                    </div>
                `;
            } catch (e) {
                showToast('创建新会话失败');
            }
        }

        async function loadHistory() {
            if (!sessionId) return;

            try {
                const res = await fetch(`/api/sessions/${sessionId}`);
                const data = await res.json();

                if (data.history && data.history.length > 0) {
                    const container = document.getElementById('chatContainer');
                    container.innerHTML = '';

                    data.history.forEach(msg => {
                        addMessage(msg.role, msg.content);
                    });
                }
            } catch (e) {
                console.error('加载历史失败:', e);
            }
        }

        function addMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) {
                emptyState.remove();
            }

            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '你' : 'C'}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message.role">${role === 'user' ? '你' : 'Claude'}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    <div class="message-text">${formatContent(content)}</div>
                </div>
            `;

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function formatContent(text) {
            // 简单的 Markdown 格式化
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
            return html;
        }

        function showTyping() {
            const container = document.getElementById('chatContainer');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) {
                emptyState.remove();
            }

            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">C</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message.role">Claude</span>
                    </div>
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) {
                typing.remove();
            }
        }

        async function sendMessage() {
            if (isStreaming) return;

            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message && files.length === 0) return;

            isStreaming = true;
            document.getElementById('sendBtn').disabled = true;

            // 显示用户消息
            addMessage('user', message);

            // 清空输入框
            input.value = '';
            input.style.height = 'auto';

            // 显示 typing
            showTyping();

            // 构建 FormData
            const formData = new FormData();
            formData.append('message', message);
            formData.append('sessionId', sessionId);

            files.forEach(f => {
                formData.append('files', f);
            });

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    body: formData
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                removeTyping();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    const lines = text.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));

                                if (data.type === 'content') {
                                    // 流式显示内容
                                    if (!fullContent) {
                                        removeTyping();
                                        addMessage('assistant', '');
                                    }
                                    fullContent += data.content;
                                    updateLastMessage(fullContent);
                                } else if (data.type === 'error') {
                                    showToast('错误: ' + data.error);
                                } else if (data.type === 'end') {
                                    isStreaming = false;
                                    document.getElementById('sendBtn').disabled = false;
                                    files = [];
                                    updateFilePreview();
                                }
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }
            } catch (error) {
                removeTyping();
                showToast('发送失败: ' + error.message);
                isStreaming = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function updateLastMessage(content) {
            const container = document.getElementById('chatContainer');
            const lastMessage = container.querySelector('.message.assistant:last-child');
            if (lastMessage) {
                lastMessage.querySelector('.message-text').innerHTML = formatContent(content);
                container.scrollTop = container.scrollHeight;
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
